<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENEE Cosmetics - GT Mass Dump</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
        }
        .file-upload-wrapper {
            margin: 20px 0;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            border: 1px solid #ccc;
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        .custom-file-upload:hover {
            background-color: #e9e9e9;
        }
        .btn {
            background-color: #d81b60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #ad1457;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
        .header {
             margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>RENEE Cosmetics</h2>
            <h4>GT Mass Dump Generator</h4>
        </div>

        <form id="uploadForm">
            {% csrf_token %}
            <div class="file-upload-wrapper">
                <label for="fileInput" class="custom-file-upload">
                    Select Excel Files
                </label>
                <input type="file" id="fileInput" name="files" accept=".xlsx, .xls" multiple required>
            </div>

            <div id="fileCount">Selected Files: 0</div>

            <button type="submit" class="btn" id="generateBtn">Generate Dump</button>
        </form>

        <div class="status" id="statusMessage">Status: Waiting</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('fileInput');
            const fileCount = document.getElementById('fileCount');
            const uploadForm = document.getElementById('uploadForm');
            const statusMessage = document.getElementById('statusMessage');
            const generateBtn = document.getElementById('generateBtn');

            fileInput.addEventListener('change', () => {
                fileCount.textContent = `Selected Files: ${fileInput.files.length}`;
            });

            uploadForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (fileInput.files.length === 0) {
                    alert("Please select files first");
                    return;
                }

                statusMessage.textContent = "Status: Processing files...";
                generateBtn.disabled = true;

                const formData = new FormData(uploadForm);
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

                try {
                    const response = await fetch("{% url 'process_files' %}", {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': csrfToken
                        }
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const disposition = response.headers.get('Content-Disposition');
                        let filename = 'gt_mass_dump.xlsx';

                        if (disposition && disposition.indexOf('filename=') !== -1) {
                            const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                            const matches = filenameRegex.exec(disposition);
                            if (matches != null && matches[1]) {
                                filename = matches[1].replace(/['"]/g, '');
                            }
                        }

                        const downloadUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = downloadUrl;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        window.URL.revokeObjectURL(downloadUrl);

                        statusMessage.textContent = "Status: Dump generated";
                    } else {
                        const errorData = await response.json();
                        alert(errorData.error || "An error occurred");
                        statusMessage.textContent = "Status: Error";
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert("Failed to process files");
                    statusMessage.textContent = "Status: Error";
                } finally {
                    generateBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
